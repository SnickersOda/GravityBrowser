<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Расширения — Gravity</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --bg2: #0d0d0d;
      --bg3: #141414;
      --card: #101010;
      --border: #1a1a1a;
      --border2: #262626;
      --text: #e8e8e8;
      --text-sub: #777;
      --text-dim: #333;
      --accent: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .page-title { font-size: 22px; font-weight: 700; }
    .btn-add {
      padding: 10px 20px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-add:hover { transform: scale(1.04); }
    .ext-list { display: flex; flex-direction: column; gap: 12px; max-width: 720px; }
    .ext-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: background 0.2s, border-color 0.2s;
    }
    .ext-card:hover {
      background: var(--bg3);
      border-color: var(--border2);
    }
    .ext-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .ext-icon img { width: 24px; height: 24px; object-fit: contain; }
    .ext-info { flex: 1; min-width: 0; }
    .ext-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .ext-version { font-size: 11px; color: var(--text-dim); margin-left: 8px; }
    .ext-desc { font-size: 13px; color: var(--text-sub); margin-top: 3px; }
    .ext-remove {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text-sub);
      font-size: 12px; cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .ext-remove:hover { border-color: #c0392b; color: #e74c3c; }
    .help-block {
      margin-top: 32px;
      padding: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-sub);
      max-width: 720px;
    }
    .help-block h4 { color: var(--text); margin-bottom: 8px; font-size: 14px; }
    .help-block ol { margin-left: 18px; margin-top: 8px; }
    .help-block li { margin-bottom: 4px; }
    .empty { color: var(--text-sub); font-size: 14px; padding: 24px 0; }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1 class="page-title">Расширения</h1>
    <button class="btn-add" id="btn-add-ext">+ Добавить</button>
  </div>
  <div class="ext-list" id="ext-list"></div>
  <div class="help-block">
    <h4>Как установить расширение</h4>
    <ol>
      <li>Скачай расширение из Chrome Web Store (или другой источник) в виде .crx или архива.</li>
      <li>Распакуй .crx (переименуй в .zip и открой) в папку.</li>
      <li>Нажми «+ Добавить» и выбери папку с распакованным расширением.</li>
    </ol>
  </div>

  <script>
    (function() {
      if (!window.gravity || !window.gravity.extensions) {
        document.getElementById('ext-list').innerHTML = '<p class="empty">API расширений недоступно. Открой эту страницу во вкладке браузера Gravity.</p>';
        return;
      }
      function render() {
        window.gravity.extensions.list().then(exts => {
          const list = document.getElementById('ext-list');
          if (!exts.length) {
            list.innerHTML = '<p class="empty">Нет установленных расширений</p>';
            return;
          }
          list.innerHTML = exts.map(e => `
            <div class="ext-card">
              <div class="ext-icon">
                <img src="" alt="" onerror="this.style.display='none'; this.nextElementSibling?.classList?.remove('hide')">
                <span class="hide" style="font-size:18px">🧩</span>
              </div>
              <div class="ext-info">
                <span class="ext-name">${escapeHtml(e.name)}</span>
                <span class="ext-version">v${escapeHtml(e.version || '')}</span>
                <div class="ext-desc">${escapeHtml(e.description || '')}</div>
              </div>
              <button class="ext-remove" data-id="${escapeHtml(e.id)}">Удалить</button>
            </div>
          `).join('');
          list.querySelectorAll('.ext-remove').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = btn.dataset.id;
              if (!confirm('Удалить расширение?')) return;
              window.gravity.extensions.remove(id).then(r => {
                if (r.success) render();
              });
            });
          });
        }).catch(() => {
          document.getElementById('ext-list').innerHTML = '<p class="empty">Ошибка загрузки списка</p>';
        });
      }
      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      document.getElementById('btn-add-ext').addEventListener('click', () => {
        window.gravity.extensions.install().then(r => {
          if (r.success) { render(); alert('Расширение установлено: ' + r.name); }
          else if (r.reason !== 'cancelled') alert('Ошибка: ' + r.reason);
        });
      });
      render();
    })();
  </script>
</body>
</html>
